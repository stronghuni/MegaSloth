name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    name: macOS (Universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Build desktop (macOS universal — x64 + arm64)
        working-directory: desktop
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          npx electron-builder --mac --universal
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        with:
          name: mac-universal
          path: |
            desktop/release/*.dmg
            desktop/release/*.zip
          if-no-files-found: error

  build-windows:
    name: Windows (x64 + arm64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Build desktop (Windows x64 + arm64)
        working-directory: desktop
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          npx electron-builder --win --x64 --arm64

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: desktop/release/*.exe
          if-no-files-found: error

  build-linux-x64:
    name: Linux (x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Build desktop (Linux x64)
        working-directory: desktop
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          npx electron-builder --linux --x64

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            desktop/release/*.AppImage
            desktop/release/*.deb
          if-no-files-found: error

  build-linux-arm64:
    name: Linux (arm64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Build desktop (Linux arm64)
        working-directory: desktop
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          npx electron-builder --linux --arm64

      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: |
            desktop/release/*.AppImage
            desktop/release/*.deb
          if-no-files-found: error

  release:
    name: Publish Release
    needs: [build-mac, build-windows, build-linux-x64, build-linux-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.deb

name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Build desktop (macOS)
        working-directory: desktop
        run: |
          pnpm install --frozen-lockfile
          pnpm build:mac

      - uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: |
            desktop/release/*.dmg
            desktop/release/*.zip
          if-no-files-found: error

  build-mac-intel:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Build desktop (macOS Intel)
        working-directory: desktop
        run: |
          pnpm install --frozen-lockfile
          pnpm build:mac

      - uses: actions/upload-artifact@v4
        with:
          name: mac-x64
          path: |
            desktop/release/*.dmg
            desktop/release/*.zip
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Build desktop (Windows)
        working-directory: desktop
        run: |
          pnpm install --frozen-lockfile
          pnpm run build:win

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            desktop/release/*.exe
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Build desktop (Linux)
        working-directory: desktop
        run: |
          pnpm install --frozen-lockfile
          pnpm run build:linux

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            desktop/release/*.AppImage
            desktop/release/*.deb
          if-no-files-found: error

  release:
    needs: [build-mac, build-mac-intel, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.deb

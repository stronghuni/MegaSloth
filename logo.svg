<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#10B981" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" rx="20" fill="url(#bg)"/>

  <!-- Sloth Character -->
  <g transform="translate(100, 60)" filter="url(#shadow)">
    <!-- Branch -->
    <line x1="20" y1="80" x2="180" y2="80" stroke="#10B981" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <circle cx="40" cy="80" r="6" fill="#10B981" opacity="0.4"/>
    <circle cx="100" cy="80" r="6" fill="#10B981" opacity="0.4"/>
    <circle cx="160" cy="80" r="6" fill="#10B981" opacity="0.4"/>

    <!-- Body -->
    <ellipse cx="100" cy="130" rx="40" ry="45" fill="#374151" opacity="0.8"/>

    <!-- Face -->
    <circle cx="100" cy="50" r="35" fill="#4B5563"/>

    <!-- Eye patches -->
    <ellipse cx="82" cy="45" rx="14" ry="12" fill="#374151"/>
    <ellipse cx="118" cy="45" rx="14" ry="12" fill="#374151"/>

    <!-- Eyes (sleepy) -->
    <ellipse cx="82" cy="46" rx="5" ry="3" fill="#FCD34D"/>
    <ellipse cx="118" cy="46" rx="5" ry="3" fill="#FCD34D"/>

    <!-- Nose -->
    <ellipse cx="100" cy="55" rx="5" ry="3" fill="#1F2937"/>

    <!-- Smile -->
    <path d="M90 62 Q100 70 110 62" stroke="#6B7280" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Arms hanging from branch -->
    <path d="M60 80 Q55 100 65 120" stroke="#4B5563" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M140 80 Q145 100 135 120" stroke="#4B5563" stroke-width="8" fill="none" stroke-linecap="round"/>

    <!-- Claws -->
    <g fill="#9CA3AF">
      <circle cx="38" cy="78" r="3"/>
      <circle cx="44" cy="82" r="3"/>
      <circle cx="36" cy="83" r="3"/>
      <circle cx="162" cy="78" r="3"/>
      <circle cx="156" cy="82" r="3"/>
      <circle cx="164" cy="83" r="3"/>
    </g>
  </g>

  <!-- Text -->
  <g transform="translate(330, 100)">
    <text font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="white">
      <tspan>Mega</tspan><tspan fill="#10B981">Sloth</tspan>
    </text>
    <text y="45" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#64748B" font-style="italic">
      Slow is smooth, smooth is fast.
    </text>
    <text y="85" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#475569">
      AI-Powered Full Automation Agent
    </text>

    <!-- Badge -->
    <rect y="110" width="70" height="22" rx="11" fill="#10B981" opacity="0.15"/>
    <text y="126" x="12" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#10B981" font-weight="500">
      84 tools
    </text>
  </g>

  <!-- Decorative dots -->
  <circle cx="750" cy="50" r="3" fill="#10B981" opacity="0.3"/>
  <circle cx="730" cy="70" r="2" fill="#10B981" opacity="0.2"/>
  <circle cx="760" cy="90" r="2" fill="#10B981" opacity="0.15"/>
  <circle cx="50" cy="250" r="3" fill="#10B981" opacity="0.2"/>
  <circle cx="70" cy="270" r="2" fill="#10B981" opacity="0.15"/>
</svg>
